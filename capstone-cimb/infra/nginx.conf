events { worker_connections 1024; }

http {
    # limit_req_zone $binary_remote_addr zone=cimb_limit:10m rate=100r/s;
    resolver 127.0.0.11 valid=10s;

    upstream python_api {
        least_conn;
        server api-service:8000;
    }

    server {
        listen 80;
        location / {
            # limit_req zone=cimb_limit burst=50 nodelay;
            proxy_pass http://python_api;
        }
    }
}